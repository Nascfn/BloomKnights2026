# DigitalOcean App Platform spec for WhoOwnsIt.
# Import via: DO dashboard → Apps → Create App → GitHub repo (it auto-detects
# this file), or `doctl apps create --spec .do/app.yaml`.
#
# After creating the app, add the two secrets in the dashboard
# (app → Settings → api component → Environment Variables):
#   GEMINI_API_KEY  (encrypted)
#   FMP_API_KEY     (encrypted)
# The app is live-only: scans fail until both keys are set.

name: whoownsit
region: nyc

# Custom domain. whoownsit.app is an apex domain on a .app TLD:
# - .app is HSTS-preloaded, so it ONLY works over HTTPS — the site is
#   unreachable on this domain until DNS resolves and DO issues the cert.
# - Easiest DNS setup for an apex: point the domain's nameservers at
#   DigitalOcean (ns1/ns2/ns3.digitalocean.com) at the registrar.
domains:
  - domain: whoownsit.app
    type: PRIMARY
  - domain: www.whoownsit.app
    type: ALIAS

static_sites:
  - name: web
    github:
      repo: Nascfn/BloomKnights2026
      branch: main
      deploy_on_push: true
    source_dir: whoownsit/client
    build_command: npm ci && npm run build
    output_dir: dist

services:
  - name: api
    github:
      repo: Nascfn/BloomKnights2026
      branch: main
      deploy_on_push: true
    source_dir: whoownsit/server
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    health_check:
      http_path: /api/health
    envs:
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
        scope: RUN_TIME

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: web
